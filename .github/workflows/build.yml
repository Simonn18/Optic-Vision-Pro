name: Build desktop app

# Construit Optic Vision Pro pour Windows, Linux et macOS avec Nuitka.
# Déclenché à chaque push/tag, ou manuellement depuis l'onglet Actions.
on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            extra: "--onefile --output-filename=OpticVisionPro"
            artifact: OpticVisionPro-Linux
            path: build/OpticVisionPro*
          - os: windows-latest
            extra: "--onefile --output-filename=OpticVisionPro.exe"
            artifact: OpticVisionPro-Windows
            path: build/OpticVisionPro.exe
          - os: macos-latest
            extra: "--macos-create-app-bundle --macos-app-name=OpticVisionPro"
            artifact: OpticVisionPro-macOS
            path: build/*.app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Dépendances système Qt pour le build/exécution sur Linux
      - name: Install Qt system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libegl1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Build with Nuitka
        shell: bash
        run: |
          python -m nuitka \
            --standalone \
            --assume-yes-for-downloads \
            --enable-plugin=pyside6 \
            --include-data-files=OPV3.png=OPV3.png \
            --include-package=skimage \
            --include-package-data=skimage \
            --include-module=scipy.spatial.distance \
            --include-module=scipy.signal \
            --include-package=cv2 \
            --include-package-data=cv2 \
            --output-dir=build \
            ${{ matrix.extra }} \
            newapp.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
